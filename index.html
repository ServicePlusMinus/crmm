<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepairCRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f1;--surface:#ffffff;--surface2:#f0efeb;--border:#e3e2de;
  --text:#181816;--text2:#5c5c58;--text3:#9a9a96;
  --purple:#4f35b3;--purple-l:#ede9fb;--purple-d:#3826a0;
  --green:#2a7a4a;--green-l:#e6f4ed;
  --amber:#b87010;--amber-l:#fef2e0;
  --red:#b83228;--red-l:#fdecea;
  --blue:#1460a0;--blue-l:#e6f0fb;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0efeb;padding:20px}
.auth-card{background:#ffffff;border:1px solid #e3e2de;border-radius:12px;padding:32px 28px;width:100%;max-width:360px}
.auth-brand-name{font-size:22px;font-weight:700;color:#4f35b3;margin-bottom:4px}
.auth-sub{font-size:13px;color:#9a9a96;margin-bottom:24px}
.auth-label{display:block;font-size:13px;font-weight:600;color:#5c5c58;margin-bottom:6px}
.auth-select{width:100%;padding:12px;border:1.5px solid #e3e2de;border-radius:8px;font-size:15px;background:#ffffff;color:#181816;margin-bottom:16px;-webkit-appearance:auto;appearance:auto}
.auth-btn{width:100%;padding:14px;background:#4f35b3;color:#ffffff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;-webkit-appearance:none;appearance:none;touch-action:manipulation}

/* LAYOUT */
#app{display:none;height:100vh;flex-direction:column}
.topnav{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 12px;display:flex;align-items:center;height:52px;gap:0;flex-shrink:0;overflow:hidden}
.brand{display:flex;align-items:center;margin-right:8px;flex-shrink:0}
.brand-ico{width:34px;height:34px;background:var(--purple);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.nav-tabs-wrap{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;height:100%;scrollbar-width:none}
.nav-tabs-wrap::-webkit-scrollbar{display:none}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:.12s;white-space:nowrap;touch-action:manipulation;-webkit-user-select:none;user-select:none;font-family:inherit;-webkit-appearance:none;appearance:none;flex-shrink:0}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
.logout-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:5px 8px;border:0.5px solid var(--border);border-radius:var(--r);background:none;transition:.12s;touch-action:manipulation;-webkit-appearance:none;appearance:none;white-space:nowrap}
.logout-btn:hover{color:var(--red);border-color:var(--red)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* PAGES */
.page{display:none;height:100%;flex-direction:column;overflow:hidden}
.page.active{display:flex}
.ph{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:0.5px solid var(--border);background:var(--surface)}
.ph-title{font-size:15px;font-weight:600}
.ph-sub{font-size:12px;color:var(--text3);margin-top:1px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--r);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:500;border:none;transition:.12s;white-space:nowrap;touch-action:manipulation;-webkit-appearance:none;appearance:none}
.btn-primary{background:var(--purple);color:#fff}.btn-primary:hover{background:var(--purple-d)}
.btn-outline{background:var(--surface);color:var(--text);border:0.5px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-success{background:var(--green-l);color:var(--green);border:0.5px solid #b0d8c0}.btn-success:hover{background:#d0eedd}
.btn-danger{background:var(--red-l);color:var(--red);border:0.5px solid #f0c0bc}.btn-danger:hover{background:#fbd6d3}
.btn-sm{padding:5px 10px;font-size:12px}

/* FILTERS */
.filters{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;align-items:center}
.fsel{padding:6px 10px;border:0.5px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--surface);color:var(--text);height:32px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap i{position:absolute;left:8px;color:var(--text3);font-size:15px;pointer-events:none}
.search-inp{padding:6px 10px 6px 30px;border:0.5px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--surface);color:var(--text);height:32px;width:220px}
.search-inp:focus,.fsel:focus{outline:none;border-color:var(--purple)}

/* TABLE */
.tbl-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:var(--surface2);text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:0.5px solid var(--border);white-space:nowrap;z-index:2;text-transform:uppercase;letter-spacing:.4px}
td{padding:10px 12px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:#faf9f7;cursor:pointer}
tr.sel td{background:var(--purple-l)}
tr td{cursor:pointer}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-new{background:#ede9fb;color:#3826a0}
.b-work{background:var(--amber-l);color:#7a4000}
.b-review{background:var(--blue-l);color:#0a3a7a}
.b-closed{background:var(--green-l);color:#1a5030}
.b-cancelled{background:#f0efeb;color:var(--text2)}

/* NOTIFY DOTS */
.ndot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.nd-ok{background:var(--green)}.nd-warn{background:var(--amber)}.nd-err{background:var(--red)}.nd-none{background:var(--border)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--rl);width:700px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-sm{width:460px}
.mh{padding:16px 20px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mh-title{font-size:15px;font-weight:600}
.mh-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;display:flex;padding:2px}
.mb{padding:20px;overflow-y:auto;flex:1}
.mf{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:0}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrid .full{grid-column:1/-1}
label.fl{font-size:12px;font-weight:500;color:var(--text2)}
.fi,.fsel2,.fta{padding:8px 11px;border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--surface);width:100%;font-family:inherit;transition:.12s}
.fi:focus,.fsel2:focus,.fta:focus{outline:none;border-color:var(--purple)}
.fta{resize:vertical;min-height:76px}
.calc-box{display:flex;gap:16px;align-items:center;background:var(--surface2);border-radius:var(--r);padding:12px 16px;border:0.5px solid var(--border)}
.calc-item .cv{font-size:18px;font-weight:700;color:var(--purple)}
.calc-item .cl{font-size:11px;color:var(--text3);margin-top:1px}
.calc-sep{color:var(--text3);font-size:20px;font-weight:300}

/* DETAIL PANEL */
.dp{width:310px;border-left:0.5px solid var(--border);overflow-y:auto;background:var(--surface);flex-shrink:0;display:flex;flex-direction:column}
.dps{padding:14px 16px;border-bottom:0.5px solid var(--border)}
.dps-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.dr{margin-bottom:10px}
.dr:last-child{margin-bottom:0}
.dr .dl{font-size:11px;color:var(--text3);margin-bottom:2px}
.dr .dv{font-size:13px;color:var(--text);font-weight:500}
.dr .dv.muted{font-weight:400;color:var(--text2);line-height:1.5}

/* NOTIFY TIMELINE */
.ntl{background:var(--surface2);border-radius:var(--r);padding:12px 14px;border:0.5px solid var(--border)}
.ntl-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.nt-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0}
.nt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nt-active{background:var(--green)}.nt-pending{background:var(--amber)}.nt-escalated{background:var(--red)}.nt-idle{background:var(--border)}

/* MASTER CARDS */
.mc-list{padding:16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1}
.mc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px;transition:.12s}
.mc:hover{border-color:var(--purple);box-shadow:0 2px 12px rgba(79,53,179,.07)}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mc-id{font-weight:700;font-size:14px}
.mc-meta{display:flex;gap:14px;font-size:12px;color:var(--text3);margin-bottom:8px;flex-wrap:wrap}
.mc-meta span{display:flex;align-items:center;gap:4px}
.mc-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.mc-phone{font-size:13px;margin-bottom:8px;color:var(--blue);font-weight:500}
.mc-actions{display:flex;gap:8px;flex-wrap:wrap}

/* UPLOAD */
.upload-area{border:1.5px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;color:var(--text3);font-size:12px;cursor:pointer;background:var(--surface);transition:.15s;touch-action:manipulation}
.upload-area:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-l)}
.upload-area i{display:block;font-size:28px;margin-bottom:4px}
.file-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;background:var(--blue-l);border:0.5px solid #b0ccee;border-radius:20px;color:var(--blue);margin:3px}

/* STATS */
.stats-top{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;flex-shrink:0}
.sc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px}
.sc-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.sc-val{font-size:26px;font-weight:700;color:var(--text)}
.sc-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sc-green .sc-val{color:var(--green)}
.sc-purple .sc-val{color:var(--purple)}

/* REFS */
.refs-wrap{display:flex;flex:1;overflow:hidden}
.refs-nav{width:190px;border-right:0.5px solid var(--border);background:var(--surface);padding:12px 0;overflow-y:auto;flex-shrink:0}
.rn-item{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text2);transition:.1s;display:flex;align-items:center;gap:8px;touch-action:manipulation;-webkit-user-select:none;user-select:none;width:100%;border:none;background:none;font-family:inherit;text-align:left;-webkit-appearance:none;appearance:none}
.rn-item:hover{color:var(--text)}
.rn-item.active{color:var(--purple);font-weight:500;background:var(--purple-l)}
.refs-body{flex:1;overflow-y:auto;padding:20px}

/* UTILS */
.hidden{display:none!important}
.flex{display:flex}
.gap-8{gap:8px}
.gap-6{gap:6px}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-blue{color:var(--blue)}
.text-muted{color:var(--text3)}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;color:var(--text3);gap:8px}
.empty i{font-size:36px}
.empty p{font-size:13px}
.sep{border:none;border-top:0.5px solid var(--border);margin:12px 0}

/* TOAST */
.toast-wrap{position:fixed;top:60px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px 16px;max-width:320px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.12);animation:slideIn .2s ease;pointer-events:auto}
.toast-warn{border-left:3px solid var(--amber);background:var(--amber-l)}
.toast-success{border-left:3px solid var(--green);background:var(--green-l)}
.toast-info{border-left:3px solid var(--purple);background:var(--purple-l)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ===== AUTH ===== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand-name">🔧 RepairCRM</div>
    <div class="auth-sub">Система управления заказами</div>

    <label class="auth-label" for="auth-role">Роль</label>
    <select class="auth-select" id="auth-role" onchange="onRoleChange()">
      <option value="">— выберите роль —</option>
      <option value="owner">Владелец</option>
      <option value="dispatcher">Диспетчер</option>
      <option value="master">Мастер</option>
    </select>

    <label class="auth-label" for="auth-user">Пользователь</label>
    <select class="auth-select" id="auth-user">
      <option value="">— сначала выберите роль —</option>
    </select>

    <button class="auth-btn" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <nav class="topnav">
    <div class="brand">
      <div class="brand-ico" id="uavatar">ЮВ</div>
    </div>
    <div class="nav-tabs-wrap" id="nav-tabs"></div>
    <div class="nav-right">
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i></button>
    </div>
  </nav>
  <div class="main">

    <!-- ORDERS -->
    <div class="page active" id="page-orders">
      <div class="ph">
        <div><div class="ph-title">Заказы</div><div class="ph-sub" id="orders-sub">—</div></div>
        <div class="flex gap-8">
          <button class="btn btn-outline" onclick="doExport()"><i class="ti ti-download"></i>Экспорт CSV</button>
          <button class="btn btn-primary" id="btn-new-order" onclick="openOrderModal(null)"><i class="ti ti-plus"></i>Новый заказ</button>
        </div>
      </div>
      <div class="filters">
        <div class="search-wrap"><i class="ti ti-search"></i><input class="search-inp" id="f-search" placeholder="Поиск по ID, адресу, телефону…" oninput="renderOrders()"></div>
        <select class="fsel" id="f-city" onchange="renderOrders()"><option value="">Все города</option></select>
        <select class="fsel" id="f-service" onchange="renderOrders()"><option value="">Все сервисы</option></select>
        <select class="fsel" id="f-status" onchange="renderOrders()">
          <option value="">Все статусы</option>
          <option value="new">Новый</option>
          <option value="work">В работе</option>
          <option value="review">На проверке</option>
          <option value="closed">Закрыт</option>
          <option value="cancelled">Отменён</option>
        </select>
        <select class="fsel" id="f-master" onchange="renderOrders()"><option value="">Все мастера</option></select>
        <select class="fsel" id="f-dispatcher" onchange="renderOrders()"><option value="">Все диспетчеры</option></select>
      </div>
      <div class="flex" style="flex:1;overflow:hidden">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>ID</th><th>Дата обращения</th><th>Город</th><th>Адрес</th>
              <th>Описание</th><th>Статус</th><th>Сервис</th>
              <th>Мастер</th><th>Диспетчер</th><th>Уведомл.</th><th>Итого</th>
            </tr></thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
        <div class="dp hidden" id="detail-panel"></div>
      </div>
    </div>

    <!-- MASTER VIEW -->
    <div class="page" id="page-master">
      <div class="ph">
        <div><div class="ph-title">Мои заказы</div><div class="ph-sub" id="master-sub">—</div></div>
      </div>
      <div class="mc-list" id="mc-list"></div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div class="stats-top" id="stats-cards"></div>
      <div style="flex:1;overflow-y:auto;padding:0 20px 20px">
        <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;margin-bottom:14px">Статистика по мастерам</div>
          <table id="stats-master-tbl" style="width:100%;border-collapse:collapse;font-size:13px"></table>
        </div>
        <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px">
          <div style="font-size:13px;font-weight:600;margin-bottom:14px">Статистика по сервисам</div>
          <table id="stats-service-tbl" style="width:100%;border-collapse:collapse;font-size:13px"></table>
        </div>
      </div>
    </div>

    <!-- REFS -->
    <div class="page" id="page-refs">
      <div class="refs-wrap">
        <div class="refs-nav">
          <button type="button" class="rn-item active" onclick="switchRef('masters',this)"><i class="ti ti-tool"></i>Мастера</button>
          <button type="button" class="rn-item" onclick="switchRef('dispatchers',this)"><i class="ti ti-headset"></i>Диспетчеры</button>
          <button type="button" class="rn-item" onclick="switchRef('services',this)"><i class="ti ti-building"></i>Сервисы</button>
          <button type="button" class="rn-item" onclick="switchRef('cities',this)"><i class="ti ti-map-pin"></i>Города</button>
        </div>
        <div class="refs-body" id="refs-body"></div>
      </div>
    </div>

  </div>
</div>

<!-- ORDER MODAL -->
<div class="overlay hidden" id="ov-order">
  <div class="modal">
    <div class="mh"><div class="mh-title" id="om-title">Новый заказ</div><button class="mh-close" onclick="closeOv('ov-order')"><i class="ti ti-x"></i></button></div>
    <div class="mb" id="om-body"></div>
    <div class="mf" id="om-footer"></div>
  </div>
</div>

<!-- MASTER CLOSE MODAL -->
<div class="overlay hidden" id="ov-close">
  <div class="modal">
    <div class="mh"><div class="mh-title">Закрытие заказа</div><button class="mh-close" onclick="closeOv('ov-close')"><i class="ti ti-x"></i></button></div>
    <div class="mb" id="cm-body"></div>
    <div class="mf" id="cm-footer"></div>
  </div>
</div>

<!-- REF MODAL -->
<div class="overlay hidden" id="ov-ref">
  <div class="modal modal-sm">
    <div class="mh"><div class="mh-title" id="rm-title">—</div><button class="mh-close" onclick="closeOv('ov-ref')"><i class="ti ti-x"></i></button></div>
    <div class="mb" id="rm-body"></div>
    <div class="mf" id="rm-footer"></div>
  </div>
</div>

<script>
// =================== DATABASE ===================
const db = {
  masters: [
    {id:'m1', name:'Алексей Морозов', cities:['Москва'], rate:50},
    {id:'m2', name:'Дмитрий Смирнов', cities:['Казань'], rate:40},
    {id:'m3', name:'Иван Рогов',       cities:['Москва','Самара'], rate:50},
  ],
  dispatchers: [
    {id:'d1', name:'Ольга Петрова'},
    {id:'d2', name:'Сергей Кузнецов'},
  ],
  services: [
    {id:'s1', name:'FixMaster', phone:'+7 (495) 000-11-22'},
    {id:'s2', name:'TechHelp',  phone:'+7 (843) 100-22-33'},
    {id:'s3', name:'DiagPro',   phone:'+7 (846) 200-33-44'},
  ],
  cities: ['Москва','Казань','Самара'],

// =================== STATE ===================
let user = null;
let role = null;
let selOrderId = null;
let ntTimers = {};
let refTab = 'masters';
let closeFiles = [];

// =================== HELPERS ===================
const $ = id => document.getElementById(id);
const gM = id => db.masters.find(x=>x.id===id);
const gS = id => db.services.find(x=>x.id===id);
const gD = id => db.dispatchers.find(x=>x.id===id);
const today = () => new Date().toISOString().split('T')[0];

const STATUS_MAP = {
  new:      ['b-new',      'Новый'],
  work:     ['b-work',     'В работе'],
  review:   ['b-review',   'На проверке'],
  closed:   ['b-closed',   'Закрыт'],
  cancelled:['b-cancelled','Отменён'],
};
function badge(s){const[c,t]=STATUS_MAP[s]||['b-new',s];return`<span class="badge ${c}">${t}</span>`}

function toast(msg, type='info'){
  const w=$('toast-wrap');
  const d=document.createElement('div');
  d.className=`toast toast-${type}`;
  d.innerHTML=msg;
  w.appendChild(d);
  setTimeout(()=>d.remove(),5000);
}

function closeOv(id){$(id).classList.add('hidden')}

// =================== AUTH ===================
function onRoleChange(){
  var r = document.getElementById('auth-role').value;
  role = r;
  var sel = document.getElementById('auth-user');
  while(sel.options.length > 0) sel.remove(0);

  var def = document.createElement('option');
  def.value = '';
  def.textContent = r ? '— выберите пользователя —' : '— сначала выберите роль —';
  sel.appendChild(def);

  if(r === 'owner'){
    var o1 = document.createElement('option');
    o1.value = 'owner'; o1.textContent = 'Юра (Владелец)';
    sel.appendChild(o1);
  } else if(r === 'dispatcher'){
    db.dispatchers.forEach(function(d){
      var o2 = document.createElement('option');
      o2.value = d.id; o2.textContent = d.name;
      sel.appendChild(o2);
    });
  } else if(r === 'master'){
    db.masters.forEach(function(m){
      var o3 = document.createElement('option');
      o3.value = m.id; o3.textContent = m.name;
      sel.appendChild(o3);
    });
  }
}

function doLogin(){
  role = document.getElementById('auth-role').value;
  const val = document.getElementById('auth-user').value;
  if(!role||!val){alert('Выберите роль и пользователя');return;}
  if(role==='owner') user={id:'owner',name:'Юра (Владелец)',role:'owner'};
  else if(role==='dispatcher') user={...gD(val),role:'dispatcher'};
  else user={...gM(val),role:'master'};

  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  initApp();
}

function doLogout(){
  Object.values(ntTimers).forEach(t=>{clearTimeout(t.t1);clearTimeout(t.t2);clearTimeout(t.t3)});
  ntTimers={};selOrderId=null;user=null;role=null;
  $('app').classList.remove('show');
  $('auth-screen').style.display='flex';
  $('auth-user').innerHTML='<option value="">— выберите пользователя —</option>';
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('active'));
}

// =================== INIT ===================
function initApp(){
  // Аватар — первые буквы имени и фамилии
  const initials = user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  $('uavatar').textContent = initials;

  const tabs=[
    {id:'orders',  label:'Заказы',      icon:'ti-list-check', roles:['owner','dispatcher']},
    {id:'master',  label:'Мои заказы',  icon:'ti-tool',       roles:['master']},
    {id:'stats',   label:'Статистика',  icon:'ti-chart-bar',  roles:['owner']},
    {id:'refs',    label:'Справочники', icon:'ti-database',   roles:['owner','dispatcher']},
  ];

  const nav=$('nav-tabs'); nav.innerHTML='';
  let first=true;
  tabs.filter(t=>t.roles.includes(user.role)).forEach(t=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='nav-tab'+(first?' active':'');
    btn.innerHTML=`<i class="ti ${t.icon}"></i>${t.label}`;
    btn.addEventListener('click',()=>switchPage(t.id,btn));
    nav.appendChild(btn);
    first=false;
  });

  if(user.role==='master'){
    $('btn-new-order')&&($('btn-new-order').style.display='none');
    activatePage('master');
    renderMasterOrders();
  } else {
    activatePage('orders');
    populateFilters();
    renderOrders();
  }
}

function activatePage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('page-'+id)?.classList.add('active');
}

function switchPage(id,el){
  activatePage(id);
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el?.classList.add('active');
  if(id==='master') renderMasterOrders();
  if(id==='stats')  renderStats();
  if(id==='refs')   renderRefTab();
}

// =================== FILTERS ===================
function populateFilters(){
  const fc=$('f-city'), fs=$('f-service'), fm=$('f-master'), fd=$('f-dispatcher');
  db.cities.forEach(c=>fc.innerHTML+=`<option value="${c}">${c}</option>`);
  db.services.forEach(s=>fs.innerHTML+=`<option value="${s.id}">${s.name}</option>`);
  db.masters.forEach(m=>fm.innerHTML+=`<option value="${m.id}">${m.name}</option>`);
  db.dispatchers.forEach(d=>fd.innerHTML+=`<option value="${d.id}">${d.name}</option>`);
}

function getFiltered(){
  const q=($('f-search')?.value||'').toLowerCase();
  const city=$('f-city')?.value||'';
  const svc=$('f-service')?.value||'';
  const st=$('f-status')?.value||'';
  const ms=$('f-master')?.value||'';
  const di=$('f-dispatcher')?.value||'';
  return db.orders.filter(o=>{
    if(city&&o.city!==city) return false;
    if(svc&&o.serviceId!==svc) return false;
    if(st&&o.status!==st) return false;
    if(ms&&o.masterId!==ms) return false;
    if(di&&o.dispatcherId!==di) return false;
    if(q){
      const hay=`${o.id} ${o.address} ${o.phone} ${o.description}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

// =================== NOTIFY BADGE ===================
function notifyBadge(o){
  if(!o.masterId||o.status==='closed'||o.status==='cancelled')
    return '<span class="text-muted" style="font-size:11px">—</span>';
  if(o.notifyEscalated)
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--red)"><span class="ndot nd-err"></span>Эскалация</span>`;
  if(o.status==='work')
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green)"><span class="ndot nd-ok"></span>Принял</span>`;
  if(o.notifyAttempts===0)
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)"><span class="ndot nd-none"></span>Ожидание</span>`;
  return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--amber)"><span class="ndot nd-warn"></span>${o.notifyAttempts} попытки</span>`;
}

// =================== ORDERS TABLE ===================
function renderOrders(){
  const list=getFiltered();
  $('orders-sub').textContent=`${list.length} заказ(ов)`;
  const tbody=$('orders-tbody');
  if(!list.length){
    tbody.innerHTML=`<tr><td colspan="11"><div class="empty"><i class="ti ti-inbox"></i><p>Заказов не найдено</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML=list.map(o=>{
    const m=gM(o.masterId), s=gS(o.serviceId), d=gD(o.dispatcherId);
    const tot=o.amount!=null&&o.expenses!=null?o.amount-o.expenses:null;
    return `<tr data-id="${o.id}" class="${selOrderId===o.id?'sel':''}">
      <td><strong>${o.id}</strong></td>
      <td style="white-space:nowrap">${o.dateCreated}</td>
      <td>${o.city}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.address}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)">${o.description}</td>
      <td>${badge(o.status)}</td>
      <td style="white-space:nowrap">${s?.name||'—'}</td>
      <td style="white-space:nowrap">${m?.name||'<span class="text-muted">Не назначен</span>'}</td>
      <td style="white-space:nowrap">${d?.name||'—'}</td>
      <td>${notifyBadge(o)}</td>
      <td style="white-space:nowrap;font-weight:500">${tot!=null?tot.toLocaleString()+' ₽':'<span class="text-muted">—</span>'}</td>
    </tr>`;
  }).join('');
  // iOS-safe click delegation
  tbody.onclick = e => {
    const tr = e.target.closest('tr[data-id]');
    if(tr) selectOrder(tr.dataset.id);
  };
}

function selectOrder(id){
  selOrderId=id;
  renderOrders();
  renderDetail(id);
}

  $('om-title').textContent=o?`Редактировать ${id}`:'Новый заказ';

  const cityOpts=db.cities.map(c=>`<option value="${c}"${o?.city===c?' selected':''}>${c}</option>`).join('');
  const svcOpts=db.services.map(s=>`<option value="${s.id}"${o?.serviceId===s.id?' selected':''}>${s.name} · ${s.phone}</option>`).join('');
  const mOpts='<option value="">— не назначен —</option>'+db.masters.map(m=>`<option value="${m.id}"${o?.masterId===m.id?' selected':''}>${m.name} (${m.rate}%)</option>`).join('');
  const dOpts=db.dispatchers.map(d=>`<option value="${d.id}"${o?.dispatcherId===d.id?' selected':''}>${d.name}</option>`).join('');
  const stOpts=['new','work','review','closed','cancelled'].map(s=>{
    const lbl=STATUS_MAP[s][1];
    return `<option value="${s}"${o?.status===s?' selected':''}>${lbl}</option>`;

  $('om-body').innerHTML=`
    <div class="fgrid">

      <div class="fg"><label class="fl">Телефон клиента *</label><input class="fi" id="of-phone" value="${o?.phone||''}" placeholder="+7 (___) ___-__-__"></div>
      <div class="fg full"><label class="fl">Адрес *</label><input class="fi" id="of-addr" value="${o?.address||''}" placeholder="ул. Ленина 42, кв. 7"></div>
      <div class="fg full"><label class="fl">Описание и озвучка клиенту *</label><textarea class="fta" id="of-desc" rows="3" placeholder="Ноутбук включается, нет изображения. Диагностика бесплатная при ремонте, при отказе 500–1500 ₽…">${o?.description||''}</textarea></div>
      <div class="fg"><label class="fl">Статус</label><select class="fsel2" id="of-status">${stOpts}</select></div>
      <div class="fg"><label class="fl">Сервис *</label><select class="fsel2" id="of-service"><option value="">—</option>${svcOpts}</select></div>
      <div class="fg"><label class="fl">Мастер</label><select class="fsel2" id="of-master" onchange="onMasterChange()">${mOpts}</select></div>
      <div class="fg"><label class="fl">Диспетчер</label><select class="fsel2" id="of-disp">${dOpts}</select></div>
      <div class="fg"><label class="fl">Дата обращения</label><input class="fi" type="date" id="of-date" value="${o?.dateCreated||today()}"></div>
      <div class="fg"><label class="fl">Ставка мастера</label>
        <div class="calc-box" style="height:38px">

        </div>
      </div>
    </div>`;

  $('om-footer').innerHTML=`
    <button class="btn btn-outline" onclick="closeOv('ov-order')">Отмена</button>

      <i class="ti ti-check"></i>${o?'Сохранить':'Создать заказ'}

}

function onMasterChange(){
  const m=gM($('of-master')?.value);
  $('of-rate-display').textContent=m?m.rate+'%':'—';
}

function saveNewOrder(){
  const city=$('of-city').value, phone=$('of-phone').value,
        addr=$('of-addr').value, desc=$('of-desc').value,
        svc=$('of-service').value;
  if(!city||!phone||!addr||!desc||!svc){toast('Заполните все обязательные поля (*)','warn');return;}
  const id='#'+db.nextId++;
  const o={id,city,address:addr,phone,description:desc,serviceId:svc,
    masterId:$('of-master').value||null, dispatcherId:$('of-disp').value||null,
    status:$('of-status').value, dateCreated:$('of-date').value,
    dateClosed:null,amount:null,expenses:null,guarantee:null,workDone:null,
    files:[],notifyAttempts:0,notifyEscalated:false};
  db.orders.unshift(o);
  if(o.masterId&&o.status==='new') startNotify(o.id);
  closeOv('ov-order');
  renderOrders();
  selectOrder(id);

function saveEditOrder(id){
  const o=db.orders.find(x=>x.id===id);
  const newMaster=$('of-master').value||null;
  if(newMaster!==o.masterId){o.notifyAttempts=0;o.notifyEscalated=false;}
  o.city=$('of-city').value; o.phone=$('of-phone').value;
  o.address=$('of-addr').value; o.description=$('of-desc').value;
  o.serviceId=$('of-service').value; o.masterId=newMaster;
  o.dispatcherId=$('of-disp').value||null;
  o.status=$('of-status').value; o.dateCreated=$('of-date').value;
  closeOv('ov-order');
  renderOrders(); renderDetail(id);
  toast(`Заказ ${id} обновлён`,'success');
}

// =================== NOTIFICATIONS ===================
function startNotify(orderId){
  const fin=()=>{
    const o=db.orders.find(x=>x.id===orderId);
    return !o||['work','closed','cancelled'].includes(o.status);
  };
  const o=db.orders.find(x=>x.id===orderId);
  if(!o||!o.masterId) return;
  o.notifyAttempts=1;
  renderOrders(); if(selOrderId===orderId) renderDetail(orderId);

  // 5 min = 300000ms, using 15000ms for demo (15 sec per step)
  const t1=setTimeout(()=>{
    if(fin()) return;
    db.orders.find(x=>x.id===orderId).notifyAttempts=2;
    renderOrders(); if(selOrderId===orderId) renderDetail(orderId);
    const t2=setTimeout(()=>{
      if(fin()) return;
      db.orders.find(x=>x.id===orderId).notifyAttempts=3;
      renderOrders(); if(selOrderId===orderId) renderDetail(orderId);
      const t3=setTimeout(()=>{
        if(fin()) return;
        const ox=db.orders.find(x=>x.id===orderId);
        ox.notifyEscalated=true;
        renderOrders(); if(selOrderId===orderId) renderDetail(orderId);
        toast(`⚠️ Мастер <b>${gM(ox.masterId)?.name}</b> не отвечает по заказу <b>${orderId}</b>. Требуется ваше решение!`,'warn');
      },12000); // 2 min demo
      ntTimers[orderId].t3=t3;
    },9000); // 3 min demo
    ntTimers[orderId].t2=t2;
  },15000); // 5 min demo
  ntTimers[orderId]={t1,t2:null,t3:null};
}

function updateCloseCalc(){
  const amt=parseFloat($('cc-amt')?.value)||0;
  const exp=parseFloat($('cc-exp')?.value)||0;
  const tot=amt-exp;
  const wrap=$('cc-calc-wrap');
  if(!wrap) return;
  wrap.innerHTML=amt||exp?`<div class="calc-box">
    <div class="calc-item"><div class="cv">${amt.toLocaleString()} ₽</div><div class="cl">Сумма</div></div>
    <div class="calc-sep">−</div>
    <div class="calc-item"><div class="cv" style="color:var(--red)">${exp.toLocaleString()} ₽</div><div class="cl">Затраты</div></div>
    <div class="calc-sep">=</div>
    <div class="calc-item"><div class="cv text-green">${tot.toLocaleString()} ₽</div><div class="cl">Итого</div></div>
  </div>`:'';
}

function handleCloseFiles(inp){
  const list=$('cc-filelist');
  Array.from(inp.files).forEach(f=>{
    closeFiles.push(f.name);
    const s=document.createElement('span');
    s.className='file-chip';
    s.innerHTML=`<i class="ti ti-file"></i>${f.name}`;
    list.appendChild(s);
  });
}

function submitClose(orderId){
  const date=$('cc-date')?.value, guar=$('cc-guar')?.value,
        amt=$('cc-amt')?.value, exp=$('cc-exp')?.value,
        parts=$('cc-parts')?.value, work=$('cc-work')?.value;
  if(!date||!guar||!amt||!exp||!parts||!work){toast('Заполните все обязательные поля (*)','warn');return;}
  if(!closeFiles.length){toast('Прикрепите минимум один файл (чек или скрин перевода)','warn');return;}
  const o=db.orders.find(x=>x.id===orderId);
  o.dateClosed=date; o.guarantee=guar;
  o.amount=parseFloat(amt); o.expenses=parseFloat(exp);
  o.workDone=`[Запчасти: ${parts}]\n${work}`;
  o.files=closeFiles; o.status='review';
  closeOv('ov-close');
  renderMasterOrders();
  toast(`Заказ ${orderId} отправлен на проверку диспетчеру`,'success');
}

function approveOrder(id){
  if(!confirm('Подтвердить закрытие заказа?')) return;
  db.orders.find(x=>x.id===id).status='closed';
  renderOrders(); renderDetail(id); renderStats();
  toast(`Заказ ${id} закрыт`,'success');
}

function cancelOrder(id){
  if(!confirm('Отменить заказ?')) return;
  db.orders.find(x=>x.id===id).status='cancelled';
  if(ntTimers[id]){clearTimeout(ntTimers[id].t1);clearTimeout(ntTimers[id].t2);clearTimeout(ntTimers[id].t3);}
  renderOrders(); renderDetail(id);
  toast(`Заказ ${id} отменён`,'info');
}

function openRefModal(type,id){
  const isNew=!id;
  let title='', body='', save;

  if(type==='master'){
    const m=id?db.masters.find(x=>x.id===id):{};
    title=isNew?'Новый мастер':'Редактировать мастера';
    body=`<div class="fgrid">
      <div class="fg full"><label class="fl">Имя *</label><input class="fi" id="rf-name" value="${m.name||''}"></div>
      <div class="fg full"><label class="fl">Города (через запятую)</label><input class="fi" id="rf-cities" value="${(m.cities||[]).join(', ')}"></div>
      <div class="fg"><label class="fl">Ставка (%) *</label><input class="fi" type="number" id="rf-rate" value="${m.rate||50}" min="0" max="100"></div>
    </div>`;
    save=()=>{
      const name=$('rf-name').value.trim();
      const rate=parseInt($('rf-rate').value)||0;
      const cities=$('rf-cities').value.split(',').map(c=>c.trim()).filter(Boolean);
      if(!name){toast('Введите имя','warn');return;}
      if(isNew) db.masters.push({id:'m'+Date.now(),name,cities,rate});
      else{const mx=db.masters.find(x=>x.id===id);mx.name=name;mx.cities=cities;mx.rate=rate;}
      closeOv('ov-ref');renderRefTab();
    };
  } else if(type==='dispatcher'){
    const d=id?db.dispatchers.find(x=>x.id===id):{};
    title=isNew?'Новый диспетчер':'Редактировать диспетчера';
    body=`<div class="fg"><label class="fl">Имя *</label><input class="fi" id="rf-name" value="${d.name||''}"></div>`;
    save=()=>{
      const name=$('rf-name').value.trim();
      if(!name){toast('Введите имя','warn');return;}
      if(isNew) db.dispatchers.push({id:'d'+Date.now(),name});
      else db.dispatchers.find(x=>x.id===id).name=name;
      closeOv('ov-ref');renderRefTab();
    };
  } else if(type==='service'){
    const s=id?db.services.find(x=>x.id===id):{};
    title=isNew?'Новый сервис':'Редактировать сервис';
    body=`<div class="fgrid">
      <div class="fg full"><label class="fl">Название *</label><input class="fi" id="rf-name" value="${s.name||''}"></div>
      <div class="fg full"><label class="fl">Номер телефона</label><input class="fi" id="rf-phone" value="${s.phone||''}" placeholder="+7 (___) ___-__-__"></div>
    </div>`;
    save=()=>{
      const name=$('rf-name').value.trim(), phone=$('rf-phone').value.trim();
      if(!name){toast('Введите название','warn');return;}
      if(isNew) db.services.push({id:'s'+Date.now(),name,phone});
      else{const sx=db.services.find(x=>x.id===id);sx.name=name;sx.phone=phone;}
      closeOv('ov-ref');renderRefTab();
    };
  } else if(type==='city'){
    title='Новый город';
    body=`<div class="fg"><label class="fl">Название города *</label><input class="fi" id="rf-city" placeholder="Казань"></div>`;
    save=()=>{
      const c=$('rf-city').value.trim();
      if(!c){toast('Введите название','warn');return;}
      if(!db.cities.includes(c)) db.cities.push(c);
      closeOv('ov-ref');renderRefTab();
    };
  }

  $('rm-title').textContent=title;
  $('rm-body').innerHTML=body;
  $('rm-footer').innerHTML=`<button class="btn btn-outline" onclick="closeOv('ov-ref')">Отмена</button><button class="btn btn-primary" onclick="window.__refSave()">Сохранить</button>`;
  window.__refSave=save;
  $('ov-ref').classList.remove('hidden');
}

// =================== EXPORT ===================
function doExport(){
  const rows=[['ID','Город','Адрес','Телефон','Описание','Сервис','Статус','Мастер','Диспетчер','Дата обращения','Дата закрытия','Сумма','Затраты','Итого','Ставка мастера %','Выплата мастеру']];
  getFiltered().forEach(o=>{
    const m=gM(o.masterId), s=gS(o.serviceId), d=gD(o.dispatcherId);
    const tot=o.amount!=null&&o.expenses!=null?o.amount-o.expenses:null;
    const pay=tot!=null&&m?Math.round(tot*m.rate/100):null;
    rows.push([o.id,o.city,o.address,o.phone,o.description,s?.name||'',STATUS_MAP[o.status][1],
      m?.name||'',d?.name||'',o.dateCreated,o.dateClosed||'',
      o.amount||'',o.expenses||'',tot||'',m?.rate||'',pay||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`orders_${today()}.csv`;
  a.click();
  toast('CSV файл скачан','success');
}
